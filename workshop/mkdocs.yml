site_name: 使用 Solution Accelerators 更快建構方案 – Foundry IQ + Fabric IQ
site_description: 實作型 workshop，示範如何建構同時結合非結構化文件知識與結構化企業資料的 AI 代理程式
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.tabs.link
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@11.6.0/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - 總覽: index.md
  - 快速開始: 00-get-started/index.md
  - 部署方案:
      - 總覽: 01-deploy/index.md
      - 管理員部署並分享: 01-deploy/00-admin-deploy-share.md
      - 部署 Azure 資源: 01-deploy/01-deploy-azure.md
      - 建立 Fabric 工作區: 01-deploy/02-setup-fabric.md
      - Fabric 詳細設定: 01-deploy/fabric/workspace-settings.md
      - 參與者執行並驗證: 01-deploy/00-participant-run-validate.md
      - 設定開發環境: 01-deploy/03-configure.md
      - 建置方案: 01-deploy/04-run-scenario.md
      - Microsoft Foundry 手動 Demo: 01-deploy/04a-manual-experiments.md
      - Microsoft Fabric 手動驗證: 01-deploy/04b-fabric-manual-validation.md
      - 腳本用途與執行順序:
          - 總覽: 01-deploy/05-script-sequence.md
          - 進階：維護者腳本對照: 01-deploy/05b-script-core-pipeline.md
          - 選配 demo 09-13: 01-deploy/05c-script-optional-demos.md
          - Browser Automation 補充設定: 01-deploy/05d-browser-automation-setup.md
          - Multi-agent 與進階範例: 01-deploy/05e-script-advanced.md
  - 依使用案例自訂:
      - 總覽: 02-customize/index.md
      - 產生與建置: 02-customize/02-generate.md
      - 測試你的 PoC: 02-customize/03-demo.md
      - 零售手動 demo: 02-customize/04-retail-manual-demo.md
      - 合約關鍵字審閱手動 demo: 02-customize/05-contract-keyword-review-manual-demo.md
  - Deep dive:
      - 總覽: 03-understand/index.md
      - "Foundry Model: 部署策略": 03-understand/00-foundry-model.md
      - "Foundry Agent: 執行時協調": 03-understand/02-foundry-agent.md
      - "Foundry Tool: 函式工具合約": 03-understand/03-foundry-tool.md
      - "Foundry IQ: 文件": 03-understand/01-foundry-iq.md
      - "Fabric IQ: 資料": 03-understand/02-fabric-iq.md
      - "Foundry Control Plane: 資源拓撲": 03-understand/04-control-plane.md
      - "Multi-Agent Extension: 情境工作流": 03-understand/05-multi-agent-extension.md
  - 清理:
      - 刪除資源: 04-cleanup/index.md
      - 下一步: 04-cleanup/next-steps.md
