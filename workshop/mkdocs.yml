site_name: 使用 Solution Accelerators 更快建構方案 – Foundry IQ + Fabric IQ
site_description: 實作型 workshop，示範如何建構同時結合非結構化文件知識與結構化企業資料的 AI 代理程式
site_url: https://nchandhi.github.io/nc-iq-workshop

repo_name: GitHub
repo_url: https://github.com/nchandhi/nc-iq-workshop

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nchandhi/nc-iq-workshop

nav:
  - 總覽: index.md
  - 快速開始:
      - 先決條件: 00-get-started/index.md
      - Workshop 流程: 00-get-started/workshop-flow.md
  - 部署方案:
      - 總覽: 01-deploy/index.md
      - 管理員部署並分享: 01-deploy/00-admin-deploy-share.md
      - 參與者執行並驗證: 01-deploy/00-participant-run-validate.md
      - 部署 Azure 資源: 01-deploy/01-deploy-azure.md
      - 建立 Fabric 工作區: 01-deploy/02-setup-fabric.md
      - 設定開發環境: 01-deploy/03-configure.md
      - 建置方案: 01-deploy/04-run-scenario.md
  - 依使用案例自訂:
      - 總覽: 02-customize/index.md
      - 產生與建置: 02-customize/02-generate.md
      - 測試你的 PoC: 02-customize/03-demo.md
  - Deep dive:
      - 總覽: 03-understand/index.md
      - "Foundry Model: 部署策略": 03-understand/00-foundry-model.md
      - "Foundry Agent: 執行時協調": 03-understand/02-foundry-agent.md
      - "Foundry Tool: 函式工具合約": 03-understand/03-foundry-tool.md
      - "Foundry IQ: 文件": 03-understand/01-foundry-iq.md
      - "Fabric IQ: 資料": 03-understand/02-fabric-iq.md
      - "Control Plane: 資源拓撲": 03-understand/04-control-plane.md
      - "Multi-Agent Extension: 情境工作流": 03-understand/05-multi-agent-extension.md
  - 清理:
      - 刪除資源: 04-cleanup/index.md
      - 下一步: 04-cleanup/next-steps.md
