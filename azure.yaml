name: fabric-ontology-lab
metadata:
  template: fabric-ontology-lab@0.0.1
services: {}
infra:
  provider: bicep
  path: infra
hooks:
  postprovision:
    posix:
      shell: sh
      run: python scripts/deploy_optional_image_model.py
      interactive: false
      continueOnError: true
    windows:
      shell: pwsh
      run: python scripts/deploy_optional_image_model.py
      interactive: false
      continueOnError: true
